# =============================================================================
# Seredeli Room 配置文件
# =============================================================================
# 此文件作为项目实体配置文件，用于：
# 1. 统一存储项目中分散的硬编码配置
# 2. 作为配置重置操作的基准
#
# 【重要】配置优先级（从高到低）：
# 1. 环境变量（敏感配置如 DATABASE_URL, JWT_SECRET, UPLOAD_DIR）
# 2. 数据库配置（system_configs 表，支持热更新）
# 3. 配置文件（本文件）
#
# 【安全提示】敏感配置请勿写入此文件：
# - DATABASE_URL: 数据库连接字符串（含密码）
# - JWT_SECRET: JWT签名密钥
# - UPLOAD_DIR: 上传文件存储路径
# - admin.initial.password: 初始管理员密码（首次启动后请立即修改）
# =============================================================================

# -----------------------------------------------------------------------------
# 应用配置
# -----------------------------------------------------------------------------
[app]
# 运行环境：development, test, production
env = "development"
# 配置文件路径（可选，默认为 config.toml）
# config_file = "config.toml"

# -----------------------------------------------------------------------------
# 服务器配置
# -----------------------------------------------------------------------------
[server]
# 服务器监听地址
host = "0.0.0.0"
# 服务器端口
port = 3000

# -----------------------------------------------------------------------------
# 数据库配置
# -----------------------------------------------------------------------------
[database]
# 数据库连接 URL（必须通过环境变量 DATABASE_URL 设置，请勿在此处配置）
# url = "postgres://username:password@localhost:5432/seredeli_room"
# 数据库连接池大小
max_connections = 10

# -----------------------------------------------------------------------------
# JWT 配置
# -----------------------------------------------------------------------------
[jwt]
# JWT 密钥（必须通过环境变量 JWT_SECRET 设置，请勿在此处配置）
# secret = "your-secret-key"
# JWT Token 过期时间（小时）
expiration_hours = 24

# -----------------------------------------------------------------------------
# 文件上传配置
# -----------------------------------------------------------------------------
[upload]
# 最大文件大小（字节），默认 10MB
max_file_size = 10485760
# 文件访问基础URL路径
base_url = "/uploads"
# 注意：上传文件存储路径必须通过环境变量 UPLOAD_DIR 设置

# -----------------------------------------------------------------------------
# WebSocket 配置
# -----------------------------------------------------------------------------
[websocket]
# WebSocket 心跳间隔（秒）
heartbeat_interval_secs = 30
# WebSocket 心跳超时（秒，超过此时间未收到 Pong 则断开连接）
heartbeat_timeout_secs = 90
# WebSocket 认证超时（秒，连接后必须在此时间内完成认证）
auth_timeout_secs = 30
# WebSocket 消息缓冲区大小
message_buffer_size = 100

# -----------------------------------------------------------------------------
# 重连策略配置
# -----------------------------------------------------------------------------
[reconnect]
# 初始退避时间（毫秒）
base_delay_ms = 1000
# 最大退避时间（毫秒）
max_delay_ms = 30000
# 最大重连尝试次数
max_attempts = 5
# 退避乘数（指数因子）
multiplier = 2

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
[logging]
# 日志级别：error, warn, info, debug, trace
level = "info"
# 是否启用结构化日志（JSON格式）
structured = true
# 日志文件路径（可选，默认输出到控制台）
# file_path = "./logs/app.log"

# -----------------------------------------------------------------------------
# CORS 配置
# -----------------------------------------------------------------------------
[cors]
# 允许的源（* 表示允许所有）
allowed_origins = ["*"]
# 允许的方法
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
# 允许的请求头
allowed_headers = ["*"]
# 是否允许凭证
allow_credentials = false
# 预检请求缓存时间（秒）
max_age = 3600

# -----------------------------------------------------------------------------
# 系统配置
# -----------------------------------------------------------------------------
[system]
# 系统名称
name = "Seredeli Room"
# 系统描述
description = "Real-time chat room application"
# 系统版本
version = "1.0.0"
# 维护模式
maintenance_mode = false
# 维护模式提示信息
maintenance_message = "System is under maintenance, please try again later."

# -----------------------------------------------------------------------------
# 管理员配置
# -----------------------------------------------------------------------------
[admin.initial]
# 是否自动创建初始超级管理员（仅在首次启动时生效）
enabled = true
# 初始超级管理员用户名
username = "admin"
# 初始超级管理员邮箱
email = "admin@example.com"
