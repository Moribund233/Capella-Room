# =============================================================================
# Seredeli Room 配置文件
# =============================================================================
# 此文件存储所有非敏感配置的默认值
#
# 【重要】配置优先级（从高到低）：
# 1. 环境变量（敏感配置如 DATABASE_URL, JWT_SECRET 等）
# 2. 本配置文件（config.toml）
#
# 【安全提示】敏感配置请勿写入此文件，应通过环境变量设置：
# - DATABASE_URL: 数据库连接字符串（含密码）
# - JWT_SECRET: JWT签名密钥
# - UPLOAD_DIR: 上传文件存储路径
# - ADMIN_INITIAL_PASSWORD: 初始管理员密码
# - REDIS_URL: Redis连接地址
# =============================================================================

# -----------------------------------------------------------------------------
# 应用配置
# -----------------------------------------------------------------------------
[app]
# 运行环境：development, test, production
# 可通过环境变量 APP_ENV 覆盖
env = "development"

# -----------------------------------------------------------------------------
# 服务器配置
# -----------------------------------------------------------------------------
[server]
# 服务器监听地址
host = "0.0.0.0"
# 服务器端口
port = 3000

# -----------------------------------------------------------------------------
# 数据库配置
# -----------------------------------------------------------------------------
[database]
# 数据库连接 URL（必须通过环境变量 DATABASE_URL 设置）
# url = "postgres://username:password@localhost:5432/seredeli_room"
# 数据库连接池大小
max_connections = 10
# 连接超时时间（秒）
acquire_timeout_secs = 30
# 空闲超时时间（秒）
idle_timeout_secs = 600

# -----------------------------------------------------------------------------
# JWT 配置
# -----------------------------------------------------------------------------
[jwt]
# JWT 密钥（必须通过环境变量 JWT_SECRET 设置）
# secret = "your-secret-key"
# JWT Token 过期时间（小时）
expiration_hours = 24

# -----------------------------------------------------------------------------
# 文件上传配置
# -----------------------------------------------------------------------------
[upload]
# 上传文件存储路径（必须通过环境变量 UPLOAD_DIR 设置）
# dir = "./uploads"
# 最大文件大小（字节），默认 10MB
max_file_size = 10485760
# 文件访问基础URL路径
base_url = "/uploads"

# -----------------------------------------------------------------------------
# WebSocket 配置
# -----------------------------------------------------------------------------
[websocket]
# WebSocket 心跳间隔（秒）
heartbeat_interval_secs = 30
# WebSocket 心跳超时（秒，超过此时间未收到 Pong 则断开连接）
heartbeat_timeout_secs = 90
# WebSocket 认证超时（秒，连接后必须在此时间内完成认证）
auth_timeout_secs = 30
# WebSocket 消息缓冲区大小
message_buffer_size = 100

# -----------------------------------------------------------------------------
# 重连策略配置
# -----------------------------------------------------------------------------
[reconnect]
# 初始退避时间（毫秒）
base_delay_ms = 1000
# 最大退避时间（毫秒）
max_delay_ms = 30000
# 最大重连尝试次数
max_attempts = 5
# 退避乘数（指数因子）
multiplier = 2

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
[logging]
# 日志级别：error, warn, info, debug, trace
level = "info"
# 是否启用结构化日志（JSON格式）
structured = true
# 日志文件路径（可选，默认输出到控制台）
# file_path = "./logs/app.log"

# -----------------------------------------------------------------------------
# 系统配置
# -----------------------------------------------------------------------------
[system]
# 系统名称
name = "Seredeli Room"
# 系统描述
description = "Real-time chat room application"
# 系统版本
version = "1.0.0"
# 维护模式
maintenance_mode = false
# 维护模式提示信息
maintenance_message = "System is under maintenance, please try again later."

# -----------------------------------------------------------------------------
# 管理员配置
# -----------------------------------------------------------------------------
[admin.initial]
# 是否自动创建初始超级管理员（仅在首次启动时生效）
enabled = true
# 初始超级管理员用户名
username = "admin"
# 初始超级管理员邮箱
email = "admin@example.com"
# 初始密码（必须通过环境变量 ADMIN_INITIAL_PASSWORD 设置）
# password = "admin123456"

# -----------------------------------------------------------------------------
# 审计配置
# -----------------------------------------------------------------------------
[audit]
# 是否启用审计日志
enabled = true
# 审计日志保留天数（0 表示永久保留）
log_retention_days = 90
# 批量写入缓冲区大小（达到此数量后自动刷新到数据库）
buffer_size = 100
# 缓冲区刷新间隔（秒）
flush_interval_seconds = 5
# 排除审计的路径（不记录这些路径的请求）
excluded_paths = ["/health", "/ws", "/static"]
# 是否启用告警检测
alert_enabled = true
# 告警冷却时间（分钟，相同类型告警的最小间隔）
alert_cooldown_minutes = 10
# 是否启用自动归档
auto_archive_enabled = true
# 归档触发时间（每天的小时数，0-23）
archive_hour = 3

# -----------------------------------------------------------------------------
# Redis 配置
# -----------------------------------------------------------------------------
[redis]
# 是否启用 Redis（可通过环境变量 REDIS_ENABLED 覆盖）
enabled = false
# Redis 连接地址（必须通过环境变量 REDIS_URL 设置）
# url = "redis://127.0.0.1:6379"
# 连接池大小
pool_size = 10
# 连接超时时间（秒）
timeout_secs = 5
# Pub/Sub 频道前缀
channel_prefix = "seredeli"
# Stream 最大长度（防止无限增长）
stream_max_len = 100000
# Consumer 批量消费大小
consumer_batch_size = 100
# Consumer 消费间隔（毫秒）
consumer_poll_interval_ms = 1000
# 是否启用配置同步
config_sync_enabled = true
