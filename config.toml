# =============================================================================
# Capella Room 配置文件
# =============================================================================
# 此文件仅存储非敏感配置的默认值
#
# 【安全警告】以下敏感配置必须通过环境变量设置，无法从此文件读取：
# - DATABASE_URL: 数据库连接字符串（含密码）
# - JWT_SECRET: JWT签名密钥
# - UPLOAD_DIR: 文件上传存储路径
# - ADMIN_INITIAL_PASSWORD: 初始管理员密码
# - REDIS_URL: Redis连接地址（如启用Redis）
#
# 配置优先级（从高到低）：
# 1. 系统环境变量
# 2. .env.{APP_ENV} 文件（如 .env.development）
# 3. .env 文件
# 4. 本配置文件（config.toml，仅非敏感配置）
# =============================================================================

# -----------------------------------------------------------------------------
# 数据库配置
# -----------------------------------------------------------------------------
[database]
# 数据库连接 URL（必须通过环境变量 DATABASE_URL 设置）
# url = "postgres://username:password@localhost:5432/capella_room"
# 数据库连接池大小
max_connections = 25
# 连接超时时间（秒）
acquire_timeout_secs = 30
# 空闲超时时间（秒）
idle_timeout_secs = 600

# -----------------------------------------------------------------------------
# JWT 配置
# -----------------------------------------------------------------------------
[jwt]
# JWT 密钥（必须通过环境变量 JWT_SECRET 设置）
# secret = "your-secret-key"
# JWT Token 过期时间（小时）
expiration_hours = 24

# -----------------------------------------------------------------------------
# 文件上传配置
# -----------------------------------------------------------------------------
[upload]
# 上传文件存储路径（必须通过环境变量 UPLOAD_DIR 设置）
# dir = "./uploads"
# 最大文件大小（字节），默认 10MB
max_file_size = 10485760
# 文件访问基础URL路径
base_url = "/uploads"
# 是否启用分片上传（默认 true）
chunked_upload_enabled = true
# 默认分片大小（字节），5MB
default_chunk_size = 5242880
# 上传会话过期时间（小时），24小时
session_ttl_hours = 24

# -----------------------------------------------------------------------------
# WebSocket 配置
# -----------------------------------------------------------------------------
[websocket]
# WebSocket 心跳间隔（秒）
heartbeat_interval_secs = 30
# WebSocket 心跳超时（秒，超过此时间未收到 Pong 则断开连接）
heartbeat_timeout_secs = 120
# WebSocket 认证超时（秒，连接后必须在此时间内完成认证）
auth_timeout_secs = 30
# WebSocket 消息缓冲区大小
message_buffer_size = 50000

# -----------------------------------------------------------------------------
# 批量消息写入配置（支持热重载）
# -----------------------------------------------------------------------------
[batch_message]
# 批量写入大小，达到此数量立即写入数据库
batch_size = 500
# 批量写入刷新间隔（毫秒）
flush_interval_ms = 50
# 队列最大长度，超过此长度将丢弃最旧的消息（写入队列本身不是广播队列，不影响实时送达）
max_queue_size = 100000

# -----------------------------------------------------------------------------
# 重连策略配置
# -----------------------------------------------------------------------------
[reconnect]
# 初始退避时间（毫秒）
base_delay_ms = 1000
# 最大退避时间（毫秒）
max_delay_ms = 30000
# 最大重连尝试次数
max_attempts = 5
# 退避乘数（指数因子）
multiplier = 2

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
[logging]
# 日志级别：error, warn, info, debug, trace
level = "info"
# 是否启用结构化日志（JSON格式）
structured = true
# 日志文件路径（可选，默认输出到控制台）
# file_path = "./logs/app.log"

# -----------------------------------------------------------------------------
# 系统配置
# -----------------------------------------------------------------------------
[system]
# 系统名称
name = "Capella Room"
# 系统描述
description = "Real-time chat room application"
# 系统版本
version = "1.0.0"
# 维护模式
maintenance_mode = false
# 维护模式提示信息
maintenance_message = "System is under maintenance, please try again later."

# -----------------------------------------------------------------------------
# 管理员配置
# -----------------------------------------------------------------------------
[admin.initial]
# 是否自动创建初始超级管理员（仅在首次启动时生效）
enabled = true
# 初始超级管理员用户名
username = "admin"
# 初始超级管理员邮箱
email = "admin@example.com"

# -----------------------------------------------------------------------------
# OAuth 2.0 配置
# -----------------------------------------------------------------------------
[oauth]
# OAuth JWT 签名密钥（独立于应用 JWT 密钥，建议通过环境变量 OAUTH_JWT_SECRET 设置）
# jwt_secret = "your-oauth-jwt-secret"
# access_token 有效期（秒），默认 3600（1 小时）
access_token_ttl = 3600
# refresh_token 有效期（秒），默认 2592000（30 天）
refresh_token_ttl = 2592000
# 授权码有效期（秒），默认 300（5 分钟）
authorization_code_ttl = 300

# -----------------------------------------------------------------------------
# 审计配置
# -----------------------------------------------------------------------------
[audit]
# 是否启用审计日志
enabled = true
# 审计日志保留天数（0 表示永久保留）
log_retention_days = 90
# 批量写入缓冲区大小（达到此数量后自动刷新到数据库）
buffer_size = 100
# 缓冲区刷新间隔（秒）
flush_interval_seconds = 5
# 排除审计的路径（不记录这些路径的请求）
excluded_paths = ["/health", "/ws", "/static"]
# 是否启用告警检测
alert_enabled = true
# 告警冷却时间（分钟，相同类型告警的最小间隔）
alert_cooldown_minutes = 10
# 是否启用自动归档
auto_archive_enabled = true
# 归档触发时间（每天的小时数，0-23）
archive_hour = 3

# -----------------------------------------------------------------------------
# Webhook 配置
# -----------------------------------------------------------------------------
[webhook]
# 后台重试扫描间隔（秒）
retry_scan_interval_secs = 30
# 默认 HTTP 超时（毫秒）
default_timeout_ms = 5000
# 默认最大重试次数
default_max_retries = 3

# -----------------------------------------------------------------------------
# Redis 配置
# -----------------------------------------------------------------------------
# REDIS_URL: Redis 连接地址（必须通过环境变量 REDIS_URL 设置）
# REDIS_ENABLED: 是否启用 Redis（默认 false）
# REDIS_POOL_SIZE: 连接池大小（默认 10）
# REDIS_TIMEOUT_SECS: 连接超时时间（默认 5）
# REDIS_CHANNEL_PREFIX: Pub/Sub 频道前缀（默认 "capella"）
# REDIS_STREAM_MAX_LEN: Stream 最大长度（默认 100000）
# REDIS_CONSUMER_BATCH_SIZE: Consumer 批量消费大小（默认 100）
# REDIS_CONSUMER_POLL_INTERVAL_MS: Consumer 消费间隔毫秒（默认 1000）
# REDIS_CONFIG_SYNC_ENABLED: 是否启用配置同步（默认 true）
[redis]
# 是否启用死信队列（默认 true）
dlq_enabled = true
# DLQ 最大重试次数（默认 3）
dlq_max_retries = 3

# -----------------------------------------------------------------------------
# 邮件（SMTP）配置
# -----------------------------------------------------------------------------
# 以下敏感配置可通过环境变量注入：
# - SMTP_PASSWORD: SMTP 登录密码或授权码（如 QQ 邮箱授权码）
# - SMTP_HOST: SMTP 服务器地址（默认 smtp.qq.com）
# - SMTP_PORT: SMTP 端口（默认 587）
# - SMTP_USERNAME: SMTP 登录用户名（通常是邮箱地址）
# - SMTP_FROM_ADDRESS: 发件人邮箱地址
# - SMTP_FROM_NAME: 发件人显示名称
[mail]
# 邮件后端: "console"（仅日志）或 "smtp"（真实发送），默认 console
backend = "smtp"
# SMTP 服务器地址
smtp_host = "smtp.qq.com"
# SMTP 端口（465=SSL, 587=STARTTLS）
smtp_port = 587
# SMTP 登录用户名
smtp_username = ""
# SMTP 密码（建议通过 SMTP_PASSWORD 环境变量注入）
smtp_password = ""
# 是否启用 TLS
smtp_use_tls = true
# 发件人地址
from_address = ""
# 发件人名称
from_name = "Capella Room"
# 验证码有效期（分钟）
verification_code_ttl = 10

