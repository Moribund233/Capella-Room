<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capella Room 密码重置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: 8px; width: 100%; max-width: 560px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: linear-gradient(135deg, #f093fb, #f5576c); padding: 32px; text-align: center; }
        .header h1 { margin: 0; color: #fff; font-size: 22px; }
        .body { padding: 32px; }
        .body p { margin: 0 0 16px; color: #555; font-size: 14px; line-height: 1.7; }
        .body p:last-child { margin-bottom: 0; }
        .code-box { background: #f0f4ff; border-radius: 6px; padding: 20px; text-align: center; margin: 24px 0; }
        .code-box span { font-size: 32px; font-weight: 700; letter-spacing: 8px; color: #667eea; font-family: monospace; }
        .hint { color: #999; font-size: 13px; }
        .footer { background: #f8f9fc; padding: 16px 32px; border-top: 1px solid #e8ecf4; text-align: center; }
        .footer p { margin: 0; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>🔑 密码重置</h1>
        </div>
        <div class="body">
            <p>您好，</p>
            <p>您收到了密码重置请求。请使用以下验证码完成重置：</p>
            <div class="code-box">
                <span>{{token}}</span>
            </div>
            <p class="hint">此验证码有效期为 {{ttl}} 分钟。</p>
            <p class="hint">如果这不是您本人操作，请忽略此邮件。</p>
        </div>
        <div class="footer">
            <p>Capella Room — 实时聊天室平台</p>
        </div>
    </div>
</body>
</html>
