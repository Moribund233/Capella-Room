<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapellaRoom 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1d23; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #252830; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .title { text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #fff; }
        .subtitle { text-align: center; color: #8e9297; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #b5bac1; margin-bottom: 8px; text-transform: uppercase; }
        input[type="email"], input[type="password"] { width: 100%; padding: 12px 16px; background: #1e2124; border: 1px solid #3f4147; border-radius: 6px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #5865f2; }
        .error { background: #ed424520; border: 1px solid #ed424560; border-radius: 6px; padding: 12px; margin-bottom: 20px; color: #ed4245; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: #5865f2; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #4752c4; }
        .btn:disabled { background: #5865f280; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">{{app_name}}</h1>
        <p class="subtitle">登录以继续</p>

        <div class="error" id="error">{{error}}</div>

        <form method="POST" action="/oauth/authorize">
            <input type="hidden" name="client_id" value="{{client_id}}">
            <input type="hidden" name="redirect_uri" value="{{redirect_uri}}">
            <input type="hidden" name="state" value="{{state}}">
            <input type="hidden" name="scope" value="{{scope}}">
            <input type="hidden" name="response_type" value="code">

            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn">登录</button>
        </form>
    </div>
    <script>
        // Hide error div if empty
        var errEl = document.getElementById('error');
        if (!errEl.textContent.trim()) errEl.style.display = 'none';
    </script>
</body>
</html>
