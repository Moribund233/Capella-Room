# Seredeli Room Nginx Configuration File
# For proxying Axum chat room application API and static file services
#
# Usage:
#   1. Copy this file to nginx.conf and update the placeholders below
#   2. Replace {{UPLOADS_PATH}} with your actual uploads directory path
#   3. Replace {{BACKEND_HOST}}:{{BACKEND_PORT}} with your backend server address

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log logs/access.log main;
    error_log logs/error.log;

    # Performance optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Upstream server - Axum application
    # Replace {{BACKEND_HOST}} and {{BACKEND_PORT}} with your backend server address
    upstream axum_backend {
        server {{BACKEND_HOST}}:{{BACKEND_PORT}};
        keepalive 32;
    }

    # HTTP server
    server {
        listen 8080;
        server_name localhost;

        # Client max request body size (for file uploads)
        client_max_body_size 50M;

        # ==================== Static File Service ====================

        # File upload directory - served directly by Nginx
        # Note: Windows paths need forward slashes or double backslashes
        # Replace {{UPLOADS_PATH}} with your actual uploads directory path
        location /uploads/ {
            alias "{{UPLOADS_PATH}}";

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;

            # Cache static files
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Static-File "nginx" always;

            # File access log
            access_log logs/static_access.log main;

            # Return 404 if file not found
            try_files $uri =404;
        }

        # Nginx health check endpoint
        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "nginx is healthy\n";
        }

        # ==================== API and WebSocket Proxy ====================

        # WebSocket endpoint - requires special Upgrade header handling
        location /ws {
            proxy_pass http://axum_backend;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # Handle OPTIONS preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' '0' always;
                return 204;
            }

            # Timeout settings
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # API endpoints - proxy to Axum backend
        location /api/ {
            proxy_pass http://axum_backend;
            proxy_http_version 1.1;

            # Keep connection
            proxy_set_header Connection "";

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;

            # Handle OPTIONS preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' '0' always;
                return 204;
            }

            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Health check endpoint - proxy to backend
        location = /health {
            proxy_pass http://axum_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;

            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Root path - return API info
        location = / {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 200 '{"name":"Seredeli Room API","version":"v1","description":"Real-time chat room API behind Nginx","endpoints":{"api":"/api/v1","websocket":"/ws","health":"/health","uploads":"/uploads"}}';
        }

        # 404 error handling
        error_page 404 = @notfound;
        location @notfound {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 404 '{"success":false,"error":{"code":"NOT_FOUND","message":"The requested resource was not found."}}';
        }

        # 50x error handling
        error_page 500 502 503 504 = @server_error;
        location @server_error {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin' '*' always;
            return 500 '{"success":false,"error":{"code":"INTERNAL_ERROR","message":"An internal server error occurred."}}';
        }
    }
}
