<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapellaRoom</title>
    <style>
      /* Favicon 主题适配 - 使用 CSS 变量 */
      /* 深色主题（默认） */
      :root {
        --wave-logo-filter: none;
      }
      
      /* 浅色主题 */
      html.light {
        --wave-logo-filter: invert(1) brightness(0.9);
      }
      
      /* 高对比度模式支持 */
      @media (prefers-contrast: high) {
        :root {
          --wave-logo-filter: contrast(1.2);
        }
        html.light {
          --wave-logo-filter: invert(1) brightness(0.9) contrast(1.2);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
