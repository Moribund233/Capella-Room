<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b14">
  <title>登录 - Wave</title>
  <style>
    :root {
      --bg: #0b0b14;
      --surface: #141420;
      --surface-elevated: #1a1a2e;
      --fg: #ececf1;
      --muted: #8b8b9e;
      --border: #262636;
      --accent: #7c5cfc;
      --accent-soft: rgba(124, 92, 252, 0.18);
      --accent-pink: #e85d9a;
      --accent-green: #3ba55d;
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Roboto', system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Roboto', system-ui, sans-serif;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      height: 100%;
      font-family: var(--font-body);
      font-size: 16px;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    
    .phone-frame {
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }
    
    @media (min-width: 431px) {
      html { background: #1a1a2e; }
      body { 
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .phone-frame {
        height: 90vh;
        border-radius: 40px;
        border: 8px solid #2a2a3e;
        overflow: hidden;
      }
    }
    
    /* 状态栏 */
    .status-bar {
      height: calc(24px + var(--safe-top));
      padding-top: var(--safe-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    
    .status-bar .icons { display: flex; gap: 6px; align-items: center; }
    .status-bar svg { width: 16px; height: 16px; }
    
    /* 头部导航 */
    .header {
      display: flex;
      align-items: center;
      padding: 12px 20px;
    }
    
    .back-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .back-btn:active { background: var(--surface-elevated); }
    .back-btn svg { width: 20px; height: 20px; }
    
    /* 主内容 */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      -webkit-overflow-scrolling: touch;
    }
    
    .content::-webkit-scrollbar { display: none; }
    
    /* Logo 区域 */
    .logo-section {
      text-align: center;
      padding: 20px 0 32px;
    }
    
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 16px;
    }
    
    .logo-section h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
    }
    
    .logo-section p {
      margin-top: 8px;
      font-size: 15px;
      color: var(--muted);
    }
    
    /* 标签切换 */
    .tab-container {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 24px;
    }
    
    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .tab-btn.active {
      background: var(--surface-elevated);
      color: var(--fg);
    }
    
    /* 表单 */
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--muted);
    }
    
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      font-size: 16px;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    
    .form-input::placeholder { color: var(--muted); opacity: 0.6; }
    
    .input-with-icon {
      position: relative;
    }
    
    .input-with-icon .form-input { padding-right: 48px; }
    
    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
    }
    
    .input-icon svg { width: 20px; height: 20px; }
    
    /* 选项行 */
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .checkbox-wrapper input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }
    
    .checkbox-wrapper span {
      font-size: 14px;
      color: var(--muted);
    }
    
    .forgot-link {
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
    }
    
    /* 按钮 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: var(--radius-full);
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    
    .btn:active { transform: scale(0.98); }
    
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      padding: 16px;
    }
    
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .btn-outline {
      width: 100%;
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 14px;
    }
    
    .btn-social {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 12px;
      font-size: 14px;
    }
    
    .btn-social svg { width: 20px; height: 20px; }
    
    /* 分隔线 */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 13px;
    }
    
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    
    /* 社交登录 */
    .social-login {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    /* 底部区域 */
    .bottom-area {
      padding: 20px;
      padding-bottom: calc(20px + var(--safe-bottom));
      background: linear-gradient(to top, var(--bg) 80%, transparent);
    }
    
    .terms-text {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
      line-height: 1.6;
    }
    
    .terms-text a {
      color: var(--accent);
      text-decoration: none;
    }
    
    /* 面板切换 */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    
    /* 输入框动画 */
    .form-group {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.4s ease forwards;
    }
    
    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* 加载动画 */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C7.46 3 3.34 4.78.29 7.67c-.18.18-.29.43-.29.71 0 .28.11.53.29.71l11 11c.39.39 1.02.39 1.41 0l11-11c.18-.18.29-.43.29-.71 0-.28-.11-.53-.29-.71C20.66 4.78 16.54 3 12 3z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    
    <!-- 头部 -->
    <div class="header">
      <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
    </div>
    
    <!-- 主内容 -->
    <div class="content">
      <!-- Logo -->
      <div class="logo-section">
        <div class="logo">W</div>
        <h1>欢迎回来</h1>
        <p>登录你的 Wave 账号</p>
      </div>
      
      <!-- 标签切换 -->
      <div class="tab-container">
        <button class="tab-btn active" data-tab="login">登录</button>
        <button class="tab-btn" data-tab="register">注册</button>
      </div>
      
      <!-- 登录面板 -->
      <div class="tab-panel active" id="login-panel">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-input" placeholder="you@example.com" id="login-email">
        </div>
        
        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-with-icon">
            <input type="password" class="form-input" placeholder="输入密码" id="login-password">
            <span class="input-icon" onclick="togglePassword('login-password')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>
        
        <div class="options-row">
          <label class="checkbox-wrapper">
            <input type="checkbox">
            <span>记住我</span>
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>
        
        <button class="btn btn-primary" onclick="handleLogin()">登录</button>
        
        <div class="divider">或使用以下方式</div>
        
        <div class="social-login">
          <button class="btn btn-social">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="btn btn-social">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </button>
        </div>
      </div>
      
      <!-- 注册面板 -->
      <div class="tab-panel" id="register-panel">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" placeholder="设置你的用户名" id="reg-username">
        </div>
        
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-input" placeholder="you@example.com" id="reg-email">
        </div>
        
        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-with-icon">
            <input type="password" class="form-input" placeholder="设置密码（至少8位）" id="reg-password">
            <span class="input-icon" onclick="togglePassword('reg-password')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>
        
        <div class="form-group">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="agree-terms">
            <span>我同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></span>
          </label>
        </div>
        
        <button class="btn btn-primary" onclick="handleRegister()">创建账号</button>
        
        <div class="divider">或使用以下方式</div>
        
        <div class="social-login">
          <button class="btn btn-social">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="btn btn-social">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </button>
        </div>
      </div>
    </div>
    
    <!-- 底部 -->
    <div class="bottom-area">
      <p class="terms-text">
        继续使用即表示你同意我们的<br>
        <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
      </p>
    </div>
  </div>
  
  <script>
    // 标签切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
        
        // 更新标题
        const title = btn.dataset.tab === 'login' ? '欢迎回来' : '创建账号';
        const subtitle = btn.dataset.tab === 'login' ? '登录你的 Wave 账号' : '开始你的 Wave 之旅';
        document.querySelector('.logo-section h1').textContent = title;
        document.querySelector('.logo-section p').textContent = subtitle;
      });
    });
    
    // 密码显示切换
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    
    // 登录处理
    function handleLogin() {
      const btn = document.querySelector('#login-panel .btn-primary');
      const originalText = btn.innerHTML;
      
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      
      setTimeout(() => {
        window.location.href = 'channels.html';
      }, 1500);
    }
    
    // 注册处理
    function handleRegister() {
      const btn = document.querySelector('#register-panel .btn-primary');
      const originalText = btn.innerHTML;
      
      if (!document.getElementById('agree-terms').checked) {
        alert('请先同意服务条款和隐私政策');
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      
      setTimeout(() => {
        window.location.href = 'channels.html';
      }, 1500);
    }
  </script>
</body>
</html>
