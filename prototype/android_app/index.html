<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Capella - Android App 原型</title>
  <style>
    :root {
      /* 设计系统 - 颜色 */
      --bg: #0b0b14;
      --surface: #141420;
      --surface-elevated: #1a1a2e;
      --fg: #ececf1;
      --muted: #8b8b9e;
      --border: #262636;
      --accent: #7c5cfc;
      --accent-soft: rgba(124, 92, 252, 0.18);
      --accent-pink: #e85d9a;
      --accent-green: #3ba55d;
      --accent-orange: #f09042;
      --accent-blue: #4a9eff;
      
      /* 字体 */
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Roboto', system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Roboto', system-ui, sans-serif;
      
      /* 圆角 */
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      
      /* 间距 */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --status-bar: 24px;
      --nav-bar: 56px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      height: 100%;
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }
    
    /* 手机框架 */
    .phone-frame {
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }
    
    @media (min-width: 431px) {
      html { background: #1a1a2e; }
      body { 
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .phone-frame {
        height: 90vh;
        border-radius: 40px;
        border: 8px solid #2a2a3e;
        overflow: hidden;
      }
    }
    
    /* 状态栏 */
    .status-bar {
      height: calc(var(--status-bar) + var(--safe-top));
      padding-top: var(--safe-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: 20px;
      font-size: 14px;
      font-weight: 600;
      background: var(--bg);
    }
    
    .status-bar .time { font-variant-numeric: tabular-nums; }
    .status-bar .icons { display: flex; gap: 6px; align-items: center; }
    .status-bar svg { width: 16px; height: 16px; }
    
    /* 主内容区 */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    
    .content::-webkit-scrollbar { display: none; }
    
    /* 启动页 */
    .splash-screen {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    
    .splash-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      border-radius: 28px;
      display: grid;
      place-items: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .splash-text {
      margin-top: 24px;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
    }
    
    .splash-tagline {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }
    
    /* 首页 Hero */
    .hero {
      padding: 40px 24px;
      text-align: center;
      position: relative;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .hero-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 24px;
      position: relative;
    }
    
    .hero h1 {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      position: relative;
    }
    
    .hero p {
      margin-top: 12px;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
      position: relative;
    }
    
    /* 功能预览卡片 */
    .preview-section {
      padding: 0 20px 24px;
    }
    
    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
    }
    
    .preview-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .preview-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    
    .preview-info h3 {
      font-size: 15px;
      font-weight: 600;
    }
    
    .preview-info span {
      font-size: 13px;
      color: var(--muted);
    }
    
    .chat-bubbles {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      animation: slideIn 0.5s ease backwards;
    }
    
    .bubble:nth-child(1) { animation-delay: 0.1s; }
    .bubble:nth-child(2) { animation-delay: 0.3s; }
    .bubble:nth-child(3) { animation-delay: 0.5s; }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .bubble-in {
      background: var(--accent);
      color: #fff;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    
    .bubble-out {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    
    /* 功能特性 */
    .features {
      padding: 24px 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .feature-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    
    .feature-icon {
      width: 44px;
      height: 44px;
      background: var(--accent-soft);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      margin: 0 auto 12px;
      color: var(--accent);
    }
    
    .feature-icon svg {
      width: 22px;
      height: 22px;
    }
    
    .feature-item h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .feature-item p {
      font-size: 12px;
      color: var(--muted);
    }
    
    /* 按钮 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: var(--radius-full);
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    
    .btn:active { transform: scale(0.98); }
    
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }
    
    .btn-large {
      width: 100%;
      padding: 16px;
    }
    
    /* 底部操作区 */
    .action-area {
      padding: 20px;
      padding-bottom: calc(20px + var(--safe-bottom));
      background: linear-gradient(to top, var(--bg) 80%, transparent);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    /* 页面列表 */
    .page-list {
      padding: 20px;
    }
    
    .page-list h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    .page-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      text-decoration: none;
      color: var(--fg);
      transition: all 0.2s ease;
    }
    
    .page-item:active {
      background: var(--surface-elevated);
      transform: scale(0.99);
    }
    
    .page-icon {
      width: 44px;
      height: 44px;
      background: var(--accent-soft);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    
    .page-icon svg {
      width: 22px;
      height: 22px;
    }
    
    .page-info {
      flex: 1;
    }
    
    .page-info h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .page-info p {
      font-size: 13px;
      color: var(--muted);
    }
    
    .page-arrow {
      color: var(--muted);
    }
    
    .page-arrow svg {
      width: 20px;
      height: 20px;
    }
    
    /* 标签 */
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
    }
    
    /* 底部导航 */
    .bottom-nav {
      height: calc(var(--nav-bar) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      transition: color 0.2s ease;
    }
    
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 24px; height: 24px; }
  </style>
</head>
<body>

    <!-- 状态栏 -->

        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C7.46 3 3.34 4.78.29 7.67c-.18.18-.29.43-.29.71 0 .28.11.53.29.71l11 11c.39.39 1.02.39 1.41 0l11-11c.18-.18.29-.43.29-.71 0-.28-.11-.53-.29-.71C20.66 4.78 16.54 3 12 3z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>

    <!-- 启动页 -->
    <div class="splash-screen" id="splash">
      <div class="splash-logo">C</div>
      <div class="splash-text">Capella</div>
      <div class="splash-tagline">社交聊天，重新想象</div>

    <!-- 主内容 -->
    <div class="content">
      <!-- Hero 区域 -->
      <div class="hero">
        <div class="hero-logo">C</div>
        <h1>Capella</h1>

            <div class="bubble bubble-in">大家好！今天有什么新动态？</div>
            <div class="bubble bubble-out">刚刚发布了新功能，快来体验！</div>
            <div class="bubble bubble-in">太棒了，马上去看看 👍</div>
          </div>
        </div>
      </div>
      
      <!-- 功能特性 -->
      <div class="features">
        <div class="feature-item">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

        <div class="feature-item">

        <div class="feature-item">
          <div class="feature-icon">

          <h4>隐私安全</h4>
          <p>端到端加密</p>
        </div>
      </div>
      
      <!-- 页面导航列表 -->
      <div class="page-list">
        <h2>探索原型</h2>
        
        <a href="login.html" class="page-item">
          <div class="page-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="page-info">
            <h3>登录 / 注册</h3>
            <p>账号认证页面</p>
          </div>
          <div class="page-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </a>
        
        <a href="channels.html" class="page-item">
          <div class="page-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

          </div>
          <div class="page-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </a>
        
        <a href="chat.html" class="page-item">
          <div class="page-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>

          </div>

        <a href="profile.html" class="page-item">

      <div style="height: 40px;"></div>

    <!-- 底部操作区 -->

      <a href="login.html" class="btn btn-primary btn-large">开始使用</a>
      <a href="login.html" class="btn btn-secondary btn-large">已有账号？登录</a>
    </div>
  </div>
  
  <script>
    // 更新时间
    function updateTime() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}`;
    }
    updateTime();
    setInterval(updateTime, 60000);
    
    // 启动页动画
    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
    }, 2000);
  </script>
</body>
