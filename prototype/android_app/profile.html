<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b14">
  <title>个人资料 - Capella</title>
  <style>
    :root {
      --bg: #0b0b14;
      --surface: #141420;
      --surface-elevated: #1a1a2e;
      --fg: #ececf1;
      --muted: #8b8b9e;
      --border: #262636;
      --accent: #7c5cfc;
      --accent-soft: rgba(124, 92, 252, 0.18);
      --accent-pink: #e85d9a;
      --accent-green: #3ba55d;
      --accent-orange: #f09042;
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Roboto', system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Roboto', system-ui, sans-serif;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-h: 64px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      height: 100%;
      font-family: var(--font-body);
      font-size: 15px;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    
    .phone-frame {
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }
    
    @media (min-width: 431px) {
      html { background: #1a1a2e; }
      body { 
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .phone-frame {
        height: 90vh;
        border-radius: 40px;
        border: 8px solid #2a2a3e;
        overflow: hidden;
      }
    }
    
    /* 头部导航 */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: calc(8px + var(--safe-top)) 16px 12px;
      background: rgba(11, 11, 20, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .back-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      background: transparent;
      border: none;
      color: var(--fg);
      cursor: pointer;
      border-radius: var(--radius);
    }
    
    .back-btn:active { background: var(--surface); }
    .back-btn svg { width: 24px; height: 24px; }
    
    .header h1 {
      font-size: 17px;
      font-weight: 600;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .icon-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      background: transparent;
      border: none;
      color: var(--fg);
      cursor: pointer;
      border-radius: var(--radius);
    }
    
    .icon-btn:active { background: var(--surface); }
    .icon-btn svg { width: 20px; height: 20px; }
    
    /* 内容区 */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .content::-webkit-scrollbar { display: none; }
    
    /* 资料头部 */
    .profile-header {
      padding: 24px 20px;
      text-align: center;
      position: relative;
    }
    
    .profile-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .avatar-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      display: grid;
      place-items: center;
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      position: relative;
      border: 4px solid var(--bg);
    }
    
    .status-indicator {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent-green);
      border: 3px solid var(--bg);
    }
    
    .edit-avatar {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--fg);
      cursor: pointer;
    }
    
    .edit-avatar svg { width: 14px; height: 14px; }
    
    .profile-name {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .profile-handle {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    
    .profile-bio {
      font-size: 14px;
      color: var(--fg);
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 16px;
    }
    
    .profile-meta {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    
    .profile-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .profile-meta svg {
      width: 14px;
      height: 14px;
    }
    
    /* 操作按钮 */
    .action-buttons {
      display: flex;
      gap: 12px;
      padding: 0 20px 24px;
    }
    
    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: var(--radius-full);
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn:active { transform: scale(0.98); }
    
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    
    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--fg);
    }
    
    .btn svg { width: 18px; height: 18px; }
    
    /* 统计卡片 */
    .stats-card {
      display: flex;
      margin: 0 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    
    .stat-item {
      flex: 1;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    
    .stat-item:active { background: var(--surface-elevated); }
    
    .stat-item:not(:last-child) {
      border-right: 1px solid var(--border);
    }
    
    .stat-value {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--fg);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    
    /* 设置列表 */
    .settings-section {
      padding: 0 20px 24px;
    }
    
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 4px;
    }
    
    .settings-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    
    .settings-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    
    .settings-item:active { background: var(--surface-elevated); }
    
    .settings-item:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }
    
    .settings-icon {
      width: 32px;
      height: 32px;
      background: var(--surface-elevated);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    
    .settings-icon svg { width: 16px; height: 16px; }
    
    .settings-info {
      flex: 1;
    }
    
    .settings-info h3 {
      font-size: 15px;
      font-weight: 500;
    }
    
    .settings-info p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    
    .settings-arrow {
      color: var(--muted);
    }
    
    .settings-arrow svg { width: 18px; height: 18px; }
    
    /* 开关 */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
    }
    
    .toggle-wrapper:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }
    
    .toggle-label {
      font-size: 15px;
    }
    
    .toggle {
      width: 48px;
      height: 26px;
      background: var(--border);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    
    .toggle.on { background: var(--accent); }
    
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }
    
    .toggle.on::after { transform: translateX(22px); }
    
    /* 危险区域 */
    .danger-zone {
      margin: 0 20px 24px;
      padding: 16px;
      background: rgba(240, 144, 66, 0.1);
      border: 1px solid rgba(240, 144, 66, 0.3);
      border-radius: var(--radius-lg);
    }
    
    .danger-zone h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-orange);
      margin-bottom: 4px;
    }
    
    .danger-zone p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    
    .btn-danger {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent-orange);
      color: var(--accent-orange);
      padding: 12px;
    }
    
    .btn-danger:active { background: rgba(240, 144, 66, 0.1); }
    
    /* 底部导航 */
    .bottom-nav {
      height: calc(var(--nav-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      transition: color 0.2s ease;
    }
    
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 24px; height: 24px; }
  </style>
</head>
