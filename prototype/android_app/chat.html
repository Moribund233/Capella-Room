<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b14">
  <title>#general - Capella</title>
  <style>
    :root {
      --bg: #0b0b14;
      --surface: #141420;
      --surface-elevated: #1a1a2e;
      --fg: #ececf1;
      --muted: #8b8b9e;
      --border: #262636;
      --accent: #7c5cfc;
      --accent-soft: rgba(124, 92, 252, 0.18);
      --accent-pink: #e85d9a;
      --accent-green: #3ba55d;
      --accent-orange: #f09042;
      --accent-blue: #4a9eff;
      --mention-bg: rgba(124, 92, 252, 0.14);
      --message-hover: rgba(236, 236, 241, 0.03);
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Roboto', system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Roboto', system-ui, sans-serif;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --header-h: 56px;
      --input-h: 60px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      height: 100%;
      font-family: var(--font-body);
      font-size: 15px;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }
    
    .phone-frame {
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }
    
    @media (min-width: 431px) {
      html { background: #1a1a2e; }
      body { 
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .phone-frame {
        height: 90vh;
        border-radius: 40px;
        border: 8px solid #2a2a3e;
        overflow: hidden;
      }
    }
    
    /* 头部 */
    .header {
      height: calc(var(--header-h) + var(--safe-top));
      padding-top: var(--safe-top);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding-inline: 12px;
      gap: 12px;
      flex-shrink: 0;
    }
    
    .back-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      background: transparent;
      border: none;
      color: var(--fg);
      cursor: pointer;
      border-radius: var(--radius);
    }
    
    .back-btn:active { background: var(--message-hover); }
    .back-btn svg { width: 24px; height: 24px; }
    
    .channel-info {
      flex: 1;
      min-width: 0;
    }
    
    .channel-info h1 {
      font-size: 17px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .channel-info h1::before {
      content: '#';
      color: var(--muted);
      font-weight: 400;
    }
    
    .channel-info p {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .header-actions {
      display: flex;
      gap: 4px;
    }
    
    .header-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: var(--radius);
    }
    
    .header-btn:active { background: var(--message-hover); color: var(--fg); }
    .header-btn svg { width: 22px; height: 22px; }
    
    /* 消息列表 */
    .messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    
    .messages::-webkit-scrollbar { display: none; }
    
    /* 日期分隔 */
    .date-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }
    
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    
    /* 消息项 */
    .message {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      animation: messageIn 0.3s ease backwards;
    }
    
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message-avatar {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
    
    .message-content {
      flex: 1;
      min-width: 0;
    }
    
    .message-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }
    
    .message-author {
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }
    
    .message-author:hover { text-decoration: underline; }
    
    .message-time {
      font-size: 12px;
      color: var(--muted);
    }
    
    .message-text {
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    
    .message-text .mention {
      background: var(--mention-bg);
      color: var(--accent);
      padding: 1px 4px;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .message-text .mention:hover { text-decoration: underline; }
    
    /* 消息操作 */
    .message-actions {
      display: flex;
      gap: 12px;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    
    .message-actions span {
      cursor: pointer;
      transition: color 0.2s ease;
    }
    
    .message-actions span:hover { color: var(--fg); }
    
    /* 反应表情 */
    .reactions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    
    .reaction {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: var(--accent-soft);
      border: 1px solid transparent;
      border-radius: var(--radius-full);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .reaction:hover { border-color: var(--accent); }
    .reaction.active { background: var(--accent); color: #fff; }
    
    /* 回复预览 */
    .reply-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--surface);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
    }
    
    .reply-preview svg {
      width: 14px;
      height: 14px;
    }
    
    .reply-preview:hover { color: var(--fg); }
    
    /* 输入区域 */
    .input-area {
      padding: 12px 16px;
      padding-bottom: calc(12px + var(--safe-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    
    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 8px 12px;
      transition: border-color 0.2s ease;
    }
    
    .input-wrapper:focus-within {
      border-color: var(--accent);
    }
    
    .input-actions {
      display: flex;
      gap: 4px;
    }
    
    .input-btn {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    
    .input-btn:active { color: var(--fg); background: var(--message-hover); }
    .input-btn svg { width: 20px; height: 20px; }
    
    .message-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--fg);
      font-size: 15px;
      font-family: inherit;
      padding: 8px 4px;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }
    
    .message-input:focus { outline: none; }
    .message-input::placeholder { color: var(--muted); }
    
    .send-btn {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: var(--radius);
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; }
    
    /* 新消息提示 */
    .new-message-toast {
      position: absolute;
      bottom: calc(var(--input-h) + var(--safe-bottom) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    
    .new-message-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    
    /* 底部导航 */
    .bottom-nav {
      display: none;
    }
    
    /* 快捷表情面板 */
    .emoji-panel {
      position: absolute;
      bottom: calc(var(--input-h) + var(--safe-bottom));
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    
    .emoji-panel.show {
      transform: translateY(0);
    }
    
    .emoji-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    
    .emoji-list::-webkit-scrollbar { display: none; }
    
    .emoji-item {
      font-size: 24px;
      padding: 8px 12px;
      background: var(--surface-elevated);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    
    .emoji-item:active { transform: scale(0.9); }
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- 头部 -->
    <div class="header">
      <button class="back-btn" onclick="location.href='channels.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="channel-info">
        <h1>general</h1>
        <p>128 位成员 · 讨论日常话题</p>
      </div>
      <div class="header-actions">
        <button class="header-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <button class="header-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
      </div>
    </div>
    
    <!-- 消息列表 -->
    <div class="messages" id="messages">
      <div class="date-divider">今天</div>
      
      <!-- 消息 1 -->
      <div class="message" style="animation-delay: 0.1s;">
        <div class="message-avatar" style="background: linear-gradient(135deg, #7c5cfc, #e85d9a);">A</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author" style="color: #e85d9a;">alex</span>
            <span class="message-time">10:23</span>
          </div>
          <div class="message-text">
            大家好！今天有什么新动态？👋
          </div>
          <div class="reactions">
            <span class="reaction">👋 3</span>
            <span class="reaction">❤️ 1</span>
          </div>
        </div>
      </div>
      
      <!-- 消息 2 -->
      <div class="message" style="animation-delay: 0.2s;">
        <div class="message-avatar" style="background: linear-gradient(135deg, #3ba55d, #4a9eff);">S</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author" style="color: #3ba55d;">sarah</span>
            <span class="message-time">10:25</span>
          </div>
          <div class="message-text">
            刚刚发布了新功能，快来体验！<span class="mention">@alex</span> 你一定会喜欢的
          </div>
          <div class="reactions">
            <span class="reaction active">🎉 5</span>
          </div>
        </div>
      </div>
      
      <!-- 消息 3 -->
      <div class="message" style="animation-delay: 0.3s;">
        <div class="message-avatar" style="background: linear-gradient(135deg, #f09042, #e85d9a);">M</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author" style="color: #f09042;">mike</span>
            <span class="message-time">10:28</span>
          </div>
          <div class="message-text">
            有人看到最新的设计稿了吗？想听听大家的意见
          </div>
          <a href="thread.html" class="reply-preview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>3 条回复</span>
          </a>
        </div>
      </div>
      
      <!-- 消息 4 -->
      <div class="message" style="animation-delay: 0.4s;">
        <div class="message-avatar" style="background: linear-gradient(135deg, #7c5cfc, #4a9eff);">J</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author" style="color: #4a9eff;">jordan</span>
            <span class="message-time">10:30</span>
          </div>
          <div class="message-text">
            太棒了，马上去看看！这个更新期待很久了 👍
          </div>
          <div class="message-actions">
            <span>回复</span>
            <span>反应</span>
            <span>更多</span>
          </div>
        </div>
      </div>
      
      <!-- 消息 5 -->
      <div class="message" style="animation-delay: 0.5s;">
        <div class="message-avatar" style="background: linear-gradient(135deg, #e85d9a, #f09042);">E</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author" style="color: #e85d9a;">emma</span>
            <span class="message-time">10:32</span>
          </div>
          <div class="message-text">
            有人要一起午餐吗？今天想试试新开的餐厅 🍜
          </div>
          <div class="reactions">
            <span class="reaction">🍜 2</span>
            <span class="reaction">👍 4</span>
          </div>
        </div>
      </div>
      
      <!-- 消息 6 -->
      <div class="message" style="animation-delay: 0.6s;">
        <div class="message-avatar" style="background: linear-gradient(135deg, #7c5cfc, #e85d9a);">A</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author" style="color: #e85d9a;">alex</span>
            <span class="message-time">10:35</span>
          </div>
          <div class="message-text">
            <span class="mention">@emma</span> 我！我想去 😋
          </div>
        </div>
      </div>
      
      <div style="height: 20px;"></div>
    </div>
    
    <!-- 新消息提示 -->
    <div class="new-message-toast" id="newToast">
      新消息 ↓
    </div>
    
    <!-- 表情面板 -->
    <div class="emoji-panel" id="emojiPanel">
      <div class="emoji-list">
        <span class="emoji-item" onclick="addEmoji('👍')">👍</span>
        <span class="emoji-item" onclick="addEmoji('❤️')">❤️</span>
        <span class="emoji-item" onclick="addEmoji('😂')">😂</span>
        <span class="emoji-item" onclick="addEmoji('🎉')">🎉</span>
        <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
        <span class="emoji-item" onclick="addEmoji('👏')">👏</span>
        <span class="emoji-item" onclick="addEmoji('😍')">😍</span>
        <span class="emoji-item" onclick="addEmoji('🤔')">🤔</span>
        <span class="emoji-item" onclick="addEmoji('👋')">👋</span>
        <span class="emoji-item" onclick="addEmoji('✨')">✨</span>
      </div>
    </div>
    
    <!-- 输入区域 -->
    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-actions">
          <button class="input-btn" onclick="toggleEmojiPanel()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
          <button class="input-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
        </div>
        <textarea class="message-input" placeholder="发消息到 #general" rows="1" id="messageInput"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
  
  <script>
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');
    const emojiPanel = document.getElementById('emojiPanel');
    
    // 自动调整输入框高度
    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      sendBtn.disabled = this.value.trim() === '';
    });
    
    // 发送消息
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      
      const newMessage = document.createElement('div');
      newMessage.className = 'message';
      newMessage.innerHTML = `
        <div class="message-avatar" style="background: linear-gradient(135deg, #7c5cfc, #e85d9a);">我</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author" style="color: #7c5cfc;">我</span>
            <span class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</span>
          </div>
          <div class="message-text">${text}</div>
        </div>
      `;
      
      messages.appendChild(newMessage);
      messageInput.value = '';
      messageInput.style.height = 'auto';
      sendBtn.disabled = true;
      
      // 滚动到底部
      messages.scrollTop = messages.scrollHeight;
    }
    
    // 回车发送
    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    // 切换表情面板
    function toggleEmojiPanel() {
      emojiPanel.classList.toggle('show');
    }
    
    // 添加表情
    function addEmoji(emoji) {
      messageInput.value += emoji;
      messageInput.focus();
      sendBtn.disabled = false;
    }
    
    // 点击外部关闭表情面板
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.input-area') && !e.target.closest('.emoji-panel')) {
        emojiPanel.classList.remove('show');
      }
    });
    
    // 初始滚动到底部
    messages.scrollTop = messages.scrollHeight;
    
    // 模拟新消息
    setTimeout(() => {
      document.getElementById('newToast').classList.add('show');
    }, 5000);
    
    document.getElementById('newToast').addEventListener('click', () => {
      messages.scrollTop = messages.scrollHeight;
      document.getElementById('newToast').classList.remove('show');
    });
  </script>
</body>
</html>
