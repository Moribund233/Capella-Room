# =============================================================================
# Capella Room - Docker Compose 配置 (生产环境)
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: capella-room:latest
    container_name: capella-room-prod
    network_mode: host
    env_file:
      - .env.production
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      # 挂载上传目录持久化
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
