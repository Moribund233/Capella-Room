# =============================================================================
# Seredeli Room - 开发环境 Docker Compose 配置
# =============================================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: seredeli-room-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 环境配置
      - APP_ENV=development
      # 数据库连接（连接到外部 PostgreSQL）
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@host.docker.internal:5432/seredeli_room}
      # JWT 密钥
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      # 上传目录
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      # 初始管理员密码
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-admin123456}
      # Redis 配置（可选，连接到外部 Redis）
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
      - REDIS_URL=${REDIS_URL:-redis://host.docker.internal:6379}
    volumes:
      # 挂载上传目录持久化
      - uploads_data:/app/uploads
      # 可选：挂载日志目录
      - ./logs:/app/logs
    networks:
      - seredeli-network
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads_data:
    driver: local

networks:
  seredeli-network:
    driver: bridge
